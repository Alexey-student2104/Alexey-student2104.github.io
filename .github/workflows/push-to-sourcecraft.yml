name: Push to SourceCraft

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push to SourceCraft
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git -c http.extraHeader="Authorization: Bearer ${{ secrets.SOURCECRAFT_TOKEN }}" \
          push https://sourcecraft.dev/d1jocker/portfolio.git main