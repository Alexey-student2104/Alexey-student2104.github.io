on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-site
        cubes:
          - name: build-site
            image: python:3.12-slim
            script:
              - python -m pip install --upgrade pip
              - python -m pip install -r requirements.txt
              - cd source
              - python -m mkdocs build --clean --strict
          - name: publish-site
            script:
              - git config user.name "sourcecraft-ci"
              - git config user.email "sourcecraft-ci@local"
              - git checkout -b release
              - git add -f site
              - "git commit -m 'deploy: publish site'"
              - git push origin release -f