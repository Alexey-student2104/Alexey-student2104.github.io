on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-site
        cubes:
          - name: build-site
            image: python:3.12-slim
            script:
              - python -m pip install --upgrade pip
              - pip install mkdocs mkdocs-dracula-theme
              - cd source
              - mkdocs build --clean --strict
              - cd ..
              - rm -rf site
              - mkdir -p site
              - cp -R source/site/. site/
          - name: publish-site
            script:
              - git config user.name "sourcecraft-ci"
              - git config user.email "sourcecraft-ci@local"
              - git checkout -B release
              - git add -f site
              - "git commit -m 'deploy: publish site' || echo 'No changes to commit'"
              - git push origin release -f
